<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Kotlin-Chess</title>
    <link type="text/css" rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <div id="root">
      <svg
        xmlns="http://www.w3.org/2000/svg"
        width="40"
        height="40"
        viewBox="0 0 50 50"
        role="presentation"
      >
        <circle
          cx="25"
          cy="25"
          r="20"
          stroke="#ccc"
          stroke-width="4"
          fill="none"
        />
        <circle
          cx="25"
          cy="25"
          r="20"
          stroke="#333"
          stroke-width="4"
          fill="none"
          stroke-linecap="round"
          stroke-dasharray="90 125"
        >
          <animateTransform
            attributeName="transform"
            type="rotate"
            from="0 25 25"
            to="360 25 25"
            dur="1s"
            repeatCount="indefinite"
          />
        </circle>
      </svg>
    </div>
    <script type="application/javascript">
      function supportsKotlinWasmRuntime() {
        try {
          new WebAssembly.Module(
            new Uint8Array([
              0x00, 0x61, 0x73, 0x6d, 0x01, 0x00, 0x00, 0x00, 0x01, 0x0b,
              0x02, 0x5e, 0x77, 0x01, 0x60, 0x02, 0x64, 0x00, 0x7f, 0x01,
              0x7f, 0x03, 0x02, 0x01, 0x01, 0x07, 0x0b, 0x01, 0x07, 0x61,
              0x31, 0x36, 0x5f, 0x67, 0x65, 0x74, 0x00, 0x00, 0x0a, 0x0b,
              0x01, 0x09, 0x00, 0x20, 0x00, 0x20, 0x01, 0xfb, 0x0d, 0x00,
              0x0b, 0x00, 0x13, 0x04, 0x6e, 0x61, 0x6d, 0x65, 0x04, 0x0c,
              0x01, 0x00, 0x09, 0x61, 0x72, 0x72, 0x61, 0x79, 0x5f, 0x69,
              0x31, 0x36,
            ]),
          );
          return true;
        } catch (_) {
          return false;
        }
      }

      if (supportsKotlinWasmRuntime()) {
        const script = document.createElement("script");
        script.src = "webApp.js";
        script.type = "application/javascript";
        document.body.appendChild(script);
      } else {
        document.getElementById("root").innerHTML =
          '<main class="unsupported-browser"><h1>Unsupported browser</h1><p>This Kotlin/Wasm app needs a browser with Wasm GC enabled. Open it in a current Chrome or Edge build instead of Safari, VS Code Simple Browser, or an embedded preview.</p></main>';
      }
    </script>
  </body>
</html>
